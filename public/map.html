<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MapPin - By Garvofadge</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗺️</text></svg>">

    <link rel="stylesheet" href="./lib/leaflet/leaflet.css" />
    <link rel="stylesheet" href="./lib/marked/github-markdown-light.min.css">
    <link rel="stylesheet" href="./lib/cropper/cropper.min.css">
    <link rel="stylesheet" href="./lib/material-icons/material-icons.css">
    <link rel="stylesheet" href="./css/style.css">

    <script src="./lib/leaflet/leaflet.js"></script>
    <script src="./lib/marked/marked.min.js"></script>
    <script src="./lib/dompurify/purify.min.js"></script>
    <script src="./lib/cropper/cropper.min.js"></script>
</head>
<body>
    
    <div id="map"></div>

    <div id="user-profile" style="position:absolute; top:20px; right:20px; z-index:1000; text-align:right; display:flex; flex-direction:column; align-items:flex-end;">
        
        <img id="my-avatar" src="/uploads/avatars/default-avatar.png" 
             class="avatar avatar-md"
             style="cursor:pointer; background: white;"
             onclick="document.getElementById('avatar-input').click()" 
             title="点击更换头像">
        
        <input type="file" id="avatar-input" accept="image/*" hidden 
               onchange="window.handleAvatarSelected(this)">
        
        <div id="my-username" 
            style="background:rgba(255,255,255,0.9); padding:4px 8px; border-radius:4px; font-weight:bold; margin-top:5px; box-shadow: var(--shadow-sm); cursor:pointer;"
            title="查看我的主页"
            onmouseover="this.style.color='#007bff'" 
            onmouseout="this.style.color='#333'"
            >Loading...</div>

    </div>

    <div id="search-container">
        <input type="text" id="user-search" class="form-control" placeholder="🔍 搜索用户..." autocomplete="off">
        
        <div id="search-results"></div> 

        <div id="visiting-banner" style="display:none;">
            <span>正在浏览: <b id="visit-name"></b></span>
            <button class="btn btn-secondary" onclick="window.exitVisitMode()" style="padding: 2px 8px; font-size: 12px;">退出访问</button>
        </div>

        <div style="margin-top: 10px; position: relative;">
            <button id="inbox-btn" class="btn btn-secondary" onclick="window.toggleInbox()" 
                    style="width:100%; justify-content:space-between;">
                <span class="flex-center"><span class="material-icons" style="font-size:16px;">mail</span> 好友请求</span>
                <span id="request-count" style="background:rgba(0,0,0,0.1); padding:0 6px; border-radius:10px; font-size:12px;">(0)</span>
            </button>
            
            <div id="inbox-list" style="display:none;"></div>
        </div>
    </div>

    <div id="floating-card" class="hidden">
        <button class="close-btn material-icons" onclick="window.closeCard()">close</button>
        
        <div id="card-content">
            <h2 id="card-title">标题</h2>
            <div id="card-body">加载中...</div>
        </div>
    </div>

    <div id="crop-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; flex-direction:column; align-items:center; justify-content:center;">
        
        <div style="background:white; padding:20px; border-radius:8px; width:90%; max-width:500px; display:flex; flex-direction:column; box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
            <h3 style="margin:0 0 15px 0; color:#333;">裁剪头像</h3>
            
            <div style="height:350px; width:100%; background:#f0f0f0; overflow:hidden; border-radius: 4px;">
                <img id="crop-image" style="max-width: 100%; display: block;">
            </div>
            
            <div style="margin-top:20px; text-align:right; display:flex; justify-content:flex-end; gap:10px;">
                <button onclick="window.cancelCrop()" class="btn btn-secondary">取消</button>
                <button onclick="window.saveAvatar()" class="btn btn-primary">
                    <span class="material-icons">check</span> 确认上传
                </button>
            </div>
        </div>
    </div>

    <div id="editor-modal" class="modal-backdrop hidden">
        <div class="modal-card">
            
            <div class="modal-header">
                <h3>
                    <span class="material-icons">edit_note</span> 
                    <span id="modal-title-text">编辑笔记</span>
                </h3>
                <button class="btn-icon">
                    <span class="material-icons">close</span>
                </button>
            </div>

            <div class="modal-meta">
                <input type="text" id="editor-title" class="form-control" placeholder="给你的笔记起个标题..." style="font-weight:bold; font-size:16px;">
                
                <select id="editor-visibility" class="form-control" style="width: auto; min-width: 120px;">
                    <option value="public">🌍 公开</option>
                    <option value="friends">🤝 仅好友</option>
                    <option value="private">🔒 仅自己</option>
                </select>
            </div>

            <div class="editor-wrapper">
                <div class="editor-toolbar">
                    <div class="toolbar-group">
                        <button class="btn-toolbar" title="加粗" onclick="insertMarkdown('**', '**')"><span class="material-icons">format_bold</span></button>
                        <button class="btn-toolbar" title="斜体" onclick="insertMarkdown('*', '*')"><span class="material-icons">format_italic</span></button>
                        <button class="btn-toolbar" title="引用" onclick="insertMarkdown('> ', '')"><span class="material-icons">format_quote</span></button>
                        <button class="btn-toolbar" title="代码块" onclick="insertMarkdown('```\n', '\n```')"><span class="material-icons">code</span></button>
                    </div>
                    
                    <div class="toolbar-group">
                        <button class="btn-toolbar" title="插入图片" onclick="document.getElementById('editor-file').click()">
                            <span class="material-icons">image</span>
                        </button>
                        <input type="file" id="editor-file" hidden>
                    </div>

                    <div class="toolbar-group" style="margin-left: auto;">
                        <button class="btn-toolbar" id="btn-preview-toggle">
                            <span class="material-icons">visibility</span> 预览
                        </button>
                    </div>
                </div>

                <textarea id="editor-content" class="form-control editor-textarea" placeholder="在此处输入内容，支持 Markdown 语法..."></textarea>
                
                <div id="editor-preview" class="editor-preview markdown-body hidden"></div>
            </div>

            <div class="modal-footer">
                <button id="btn-editor-delete" class="btn btn-danger" style="margin-right: auto;">
                    <span class="material-icons">delete</span> 删除
                </button>

                <div style="display: flex; align-items: center; gap: 15px;">
                    <div class="status-text">
                        <span id="draft-status" class="fade-text"></span>
                    </div>
                    <div class="action-buttons">
                        <button class="btn btn-secondary">取消</button>

                        <button id="btn-save-draft" class="btn btn-secondary">
                            <span class="material-icons">save</span> 保存草稿
                        </button>

                        <button class="btn btn-primary" >
                            <span class="material-icons">upload</span> 发布笔记
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div id="profile-backdrop" class="drawer-backdrop"></div>
    
    <div id="profile-drawer" class="profile-drawer">
        <div class="drawer-header">
            <button id="close-profile-btn" class="icon-btn">
                <span class="material-icons">close</span>
            </button>
        </div>

        <div class="profile-info-section">
            <img id="profile-avatar" src="/uploads/avatars/default-avatar.png" alt="Avatar" class="profile-large-avatar">
            <h2 id="profile-username" class="profile-name">加载中...</h2>
            <p id="profile-bio" class="profile-bio">这个人很懒，什么都没写~</p>
            <textarea id="profile-bio-input" class="profile-bio-edit" maxlength="100" style="display: none;" placeholder="写点什么介绍一下自己吧..."></textarea>
        </div>

        <div id="profile-action-container" class="profile-actions">
            </div>

        <div class="profile-tabs">
            <div class="tab-item active" data-target="tab-notes">
                <span class="material-icons">place</span> 足迹
            </div>
            <div class="tab-item" data-target="tab-friends" id="tab-friends-btn" style="display: none;">
                <span class="material-icons">people</span> 好友
            </div>
        </div>

        <div class="profile-content">
            <div id="tab-notes" class="tab-pane active">
                <div id="profile-notes-list" class="notes-list-container">
                    <p class="empty-hint">暂无公开足迹</p>
                </div>
            </div>
            <div id="tab-friends" class="tab-pane">
                <div id="profile-friends-list" class="friends-list-container">
                    </div>
            </div>
        </div>
    </div>

    <script type="module" src="./js/app.js"></script>
    <script type="module" src="./js/editorManager.js"></script>

</body>
</html>
